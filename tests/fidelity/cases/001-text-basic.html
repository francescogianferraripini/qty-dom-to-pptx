<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>text-basic</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    box-sizing: border-box;
    padding: 64px;
    font-family: Arial, sans-serif;
    color: #1a1a1a;
    background: #ffffff;
  }
  h1 { font-size: 48px; margin: 0 0 24px; font-weight: 700; }
  p  { font-size: 24px; line-height: 1.4; margin: 0 0 16px; }
  .muted { color: #666; }
</style>
</head>
<body>
  <div id="target">
    <h1>Heading One</h1>
    <p>The quick brown fox jumps over the lazy dog.</p>
    <p class="muted">Second paragraph in muted gray.</p>
  </div>
</body>
</html>

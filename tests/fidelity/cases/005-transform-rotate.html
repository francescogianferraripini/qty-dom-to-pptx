<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>transform-rotate</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .badge {
    width: 240px;
    height: 240px;
    background: #ff5722;
    transform: rotate(-15deg);
  }
</style>
</head>
<body>
  <div id="target">
    <div class="badge"></div>
  </div>
</body>
</html>

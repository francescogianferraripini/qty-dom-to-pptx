<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>box-shadow</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0f0f0; }
  #target {
    width: 960px;
    height: 540px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 360px;
    height: 240px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 16px 32px rgba(0, 0, 0, 0.25);
  }
</style>
</head>
<body>
  <div id="target">
    <div class="card"></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>text-transform-tr</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    box-sizing: border-box;
    padding: 64px;
    font-family: Arial, sans-serif;
    color: #1a1a1a;
    background: #ffffff;
  }
  h1 {
    font-size: 64px;
    margin: 0 0 24px;
    font-weight: 700;
    text-transform: uppercase;
  }
  p { font-size: 22px; line-height: 1.4; margin: 0 0 16px; }
  .label {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 18px;
    color: #888;
  }
</style>
</head>
<body>
  <div id="target">
    <p class="label">Türkçe başlık</p>
    <h1>istanbul ili</h1>
    <p>Locale-aware uppercase: dotted-i should stay dotted (İ), and dotless-i should stay dotless (I).</p>
  </div>
</body>
</html>

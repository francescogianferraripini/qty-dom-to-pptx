<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>transparent-border</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  /* Many CSS resets place `border: 1px solid transparent` on interactive
     elements so :focus / :hover swapping a colored border doesn't shift
     layout. parseColor today returns alpha 0 and the border collapses,
     causing a sub-pixel shift inside the row. */
  .swatch {
    width: 240px;
    height: 160px;
    background: #f5f3ee;
    border-radius: 6px;
    box-sizing: border-box;
  }
  .ghost { border: 4px solid transparent; }
  .ink { border: 4px solid #c41e3a; }
</style>
</head>
<body>
  <div id="target">
    <div class="swatch ghost"></div>
    <div class="swatch ink"></div>
  </div>
</body>
</html>

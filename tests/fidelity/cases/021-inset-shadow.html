<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>inset-shadow</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Inset shadow: today utils.js sets type:'outer' unconditionally so the
     shadow renders outside the box rather than inside. Visual defect is
     localized to the card edges. */
  .well {
    width: 320px;
    height: 200px;
    background: #f5f3ee;
    border-radius: 12px;
    box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.30);
  }
</style>
</head>
<body>
  <div id="target">
    <div class="well"></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>pseudo-circle-percent</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    box-sizing: border-box;
    padding: 80px;
    font-family: Arial, sans-serif;
    color: #1a1a1a;
    background: #ffffff;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    align-content: center;
  }
  .dot {
    position: relative;
    height: 80px;
  }
  /* Circular timeline dot — border-radius:50% must resolve to half the
     pseudo's smaller dimension. */
  .dot::before {
    content: '';
    position: absolute;
    left: 30px;
    top: 30px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #ffffff;
    border: 3px solid #6b1f3a;
  }
  .dot.done::before { background: #6b1f3a; }
  .label {
    position: absolute;
    left: 70px;
    top: 32px;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div id="target">
    <div class="dot done"><span class="label">Stage 1</span></div>
    <div class="dot done"><span class="label">Stage 2</span></div>
    <div class="dot"><span class="label">Stage 3</span></div>
    <div class="dot"><span class="label">Stage 4</span></div>
  </div>
</body>
</html>

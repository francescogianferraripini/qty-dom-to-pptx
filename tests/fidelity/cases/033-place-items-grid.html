<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>place-items-grid</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    box-sizing: border-box;
    padding: 56px;
    background: #ffffff;
    font-family: Arial, sans-serif;
    /* `place-items` is the shorthand for align-items / justify-items.
       Phase 1.3 #3: today this shorthand is read raw and the alignment
       branch silently misses, so the grid cells render top-left
       regardless of the shorthand. */
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 18px;
    place-items: center;
  }
  .cell {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    display: grid;
    place-content: center;
  }
  .a { background: #00838f; }
  .b { background: #5d4037; }
  .c { background: #ad1457; }
  .d { background: #455a64; }
</style>
</head>
<body>
  <div id="target">
    <div class="cell a">North</div>
    <div class="cell b">South</div>
    <div class="cell c">East</div>
    <div class="cell d">West</div>
  </div>
</body>
</html>

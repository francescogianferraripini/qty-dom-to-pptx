<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>flex-column-distributed</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #target {
    width: 960px;
    height: 540px;
    box-sizing: border-box;
    padding: 48px;
    background: #ffffff;
    font-family: Arial, sans-serif;
  }
  /* `flex-direction: column` swaps the meaning of justify-content and
     align-items: justify-content drives the *vertical* axis, align-items
     the horizontal. The Phase 1.3 readout has to honor `flex-direction`
     before mapping to PPTX align/valign. Tests the swap on three columns
     plus a row that stretches the whole strip. */
  .strip {
    display: flex;
    gap: 18px;
    height: 100%;
  }
  .col {
    flex: 1;
    border-radius: 12px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    padding: 18px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  /* justify-content on a column drives vertical placement. */
  .topCenter { background: #00695c; justify-content: flex-start; align-items: center; }
  .middleStretch { background: #ad1457; justify-content: center; align-items: stretch; }
  .bottomEnd { background: #303f9f; justify-content: flex-end; align-items: flex-end; }
</style>
</head>
<body>
  <div id="target">
    <div class="strip">
      <div class="col topCenter">TOP CENTER</div>
      <div class="col middleStretch">MIDDLE</div>
      <div class="col bottomEnd">BOTTOM RIGHT</div>
    </div>
  </div>
</body>
</html>
